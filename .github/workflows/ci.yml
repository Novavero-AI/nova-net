name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Lint jobs (fast, Linux-only)
# ---------------------------------------------------------------------------

jobs:
  lint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.8'
      - uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "test/", "bench/"]'
          fail-on: warning

  format:
    name: Ormolu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/run-ormolu@v16
        with:
          pattern: |
            src/**/*.hs
            test/**/*.hs
            bench/**/*.hs

  # ---------------------------------------------------------------------------
  # Packaging check (Linux-only)
  # ---------------------------------------------------------------------------

  cabal-check:
    name: Cabal Check
    needs: [lint, format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: 'latest'
      - run: cabal check

  # ---------------------------------------------------------------------------
  # Build (cross-platform matrix — C + Haskell)
  # ---------------------------------------------------------------------------

  build:
    name: Build (${{ matrix.name }})
    needs: [lint, format, cabal-check]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: 'latest'

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-${{ runner.os }}-v1-${{ hashFiles('nova-net.cabal') }}
          restore-keys: cabal-${{ runner.os }}-v1-

      - name: Build
        run: cabal build --ghc-options="-Werror"

      - name: Test
        run: cabal test --ghc-options="-Werror" --test-show-details=streaming
